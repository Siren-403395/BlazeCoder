<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="A coding agent workspace — describe an app, watch it get built, previewed, and refined." />
    <title>Coding Agent</title>
    <script>
      // Resolve the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("ca-theme") || "dark";
          var resolved =
            saved === "system"
              ? window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark"
              : saved;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          /* keep the dark default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
