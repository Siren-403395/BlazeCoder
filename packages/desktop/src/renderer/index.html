<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- script-src allows 'unsafe-inline' because Vite's dev server injects an inline
         React-Refresh preamble; in prod all scripts are same-origin bundles and there is no
         remote content (sandbox + no nodeIntegration + model text rendered as text, never HTML).
         connect-src permits the Vite dev server (HMR websocket); unused/harmless in prod. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' ws://127.0.0.1:5173 http://127.0.0.1:5173"
    />
    <title>zephyrcode</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
